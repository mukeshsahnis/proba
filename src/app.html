<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PROBA | Interactive High-School Probability & Visual Tutor</title>
    <meta
      name="description"
      content="A progressive, interactive probability tutor for high school students featuring visual simulations, step-by-step guidance, and AI assistance."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;1,400&family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['\\(', '\\)'], ['$','$']],
          displayMath: [['\\[', '\\]'], ['$$','$$']]
        }
      };
    </script>
    <script
      id="MathJax-script"
      async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
    ></script>
    %sveltekit.head%
  </head>
  <body
    data-sveltekit-preload-data="hover"
    class="bg-slate-50 font-sans text-slate-900 antialiased selection:bg-amber-400 selection:text-slate-950"
  >
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
